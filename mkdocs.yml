###
### mkdocs-plugins.yml
###

plugins:
  - awesome-pages
  - meta
  - git-committers:
      branch: main
      docs_path: Labs
      enabled: true
      repository: nirgeier/JiraLab
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      fallback_to_build_date: true
      locale: en
      timezone: UTC
      type: date
  - search:
      separator: "[\\s\\u200b\\-_,:!=\\[\\]()\"`/]+|\\.(?!\\d)|&[lg]t;|(?!\\b)(?=[A-Z\
        ][a-z])"
  - minify:
      minify_html: true
  - print-site
  - include-markdown
###
### mkdocs-extensions.yml
###

markdown_extensions:
  - toc:
      permalink: false
      baselevel: 3
      toc_depth: 3
  - abbr
  - tables
  - admonition
  - footnotes
  - attr_list
  - def_list
  - md_in_html
  - smarty
  - meta
  - codehilite:
      guess_lang: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: "!!python/name:pymdownx.superfences.fence_code_format"
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ""
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ""
